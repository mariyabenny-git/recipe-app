<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChefMate</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <h1>ChefMate</h1>
  <button id="langToggle">🌐</button>
</header>

<!-- HOME -->
<section id="home" class="active">

  <div class="hero">
    <h2>What would you like to cook today? 👩‍🍳</h2>
    <input type="text" placeholder="Search recipes..." id="search">
  </div>

  <div class="chips">
    <button class="chip active">All</button>
    <button class="chip">Breakfast</button>
    <button class="chip">Main</button>
    <button class="chip">Dessert</button>
    <button class="chip">Juice</button>
  </div>

  <h2>🔥 Trending</h2>
  <div id="recipesContainer" class="card-grid"></div>

</section>

<!-- DETAIL -->
<section id="recipeDetail"></section>

<!-- FAB -->
<button id="startCooking">🍳</button>

<!-- NAV -->
<nav class="bottom-nav">
  <button onclick="showPage('home', this)" class="active">🏠</button>
  <button onclick="showPage('recipeDetail', this)">📖</button>
</nav>

<script src="script.js"></script>
</body>
</html>
