<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eco-Chef AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <h1>🌱 Eco-Chef AI</h1>
  <button id="langToggle">🌐</button>
</header>

<section id="home" class="active">

  <!-- SCAN -->
  <div class="scan-box">
    <button onclick="scanPantry()">📸 Scan My Fridge</button>
  </div>

  <!-- QUICK WINS -->
  <h2>⚡ Quick Wins (15 min)</h2>
  <div id="quickRecipes" class="card-grid"></div>

  <!-- CATEGORY -->
  <div class="categories">
    <div onclick="filterCat('Main')">🍛</div>
    <div onclick="filterCat('Dessert')">🍰</div>
    <div onclick="filterCat('Juice')">🥤</div>
  </div>

  <!-- DAILY -->
  <h2>✨ Daily Inspiration</h2>
  <div id="recipesContainer" class="card-grid"></div>

</section>

<section id="recipeDetail"></section>

<button id="cookMode">🎤 Cook Mode</button>

<script src="script.js"></script>
</body>
</html>
