<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eco-Chef AI</title>

  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<header class="header">
  <h2>🌱 Eco-Chef AI</h2>
  <div>
    <button id="toggleDark">🌙</button>
    <button onclick="toggleLang()">🌍</button>
  </div>
</header>

<input type="text" id="search" placeholder="Search recipes..." />

<div id="chips"></div>

<div style="text-align:center; margin:15px;">
  <button onclick="startCamera()" class="scan-btn">
    📷 Scan My Fridge
  </button>
</div>

<div id="recipes" class="grid"></div>

<div id="popup" class="popup hidden"></div>

<nav class="bottom-nav">
  <button onclick="loadRecipes()">🏠</button>
  <button onclick="showFavorites()">❤️</button>
  <button onclick="startCamera()">📷</button>
</nav>

<script src="script.js"></script>

</body>
</html>
