<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eco-Chef AI</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <!-- ICONS -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="header-text">
    <h2>👋 Hey, Chef</h2>
    <p class="sub">What's on the menu today?</p>
  </div>
</header>

<!-- SEARCH -->
<div class="search-wrapper">
  <input type="text" id="search" placeholder="Search recipes...">
</div>

<!-- CATEGORY CHIPS -->
<div id="chips" class="chips"></div>

<!-- MAIN CONTENT -->
<main id="recipes" class="grid"></main>

<!-- POPUP (Recipe Detail) -->
<div id="popup" class="popup hidden"></div>

<!-- SCANNER (AI Input) -->
<div id="scanner" class="popup hidden"></div>

<!-- MUSIC PLAYER -->
<div class="music-player">
  <span>🎵 Relax Cooking Mode</span>
  <button onclick="toggleMusic()" id="musicBtn">▶️</button>
</div>

<!-- AUDIO -->
<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button onclick="goHome()" class="nav-btn active">
    <i data-lucide="home"></i>
  </button>

  <button onclick="document.getElementById('search').focus()" class="nav-btn">
    <i data-lucide="search"></i>
  </button>

  <button onclick="startCamera()" class="nav-btn">
    <i data-lucide="camera"></i>
  </button>

  <button onclick="showFavorites()" class="nav-btn">
    <i data-lucide="heart"></i>
  </button>
</nav>

<!-- SCRIPT -->
<script src="script.js"></script>

<!-- ICON INIT -->
<script>
  lucide.createIcons();
</script>

</body>
</html>
