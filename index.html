<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eco-Chef AI</title>

  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<header class="header">
  <div>
    <h3>Hey, CHEF👋</h3>
    <p class="sub">What are we cooking today?</p>
  </div>
  <div>
    <button>⚙️</button>
    <button onclick="toggleLang()">🌍</button>
  </div>
</header>

<input type="text" id="search" placeholder="Search recipes..." />

<div id="chips"></div>

<div style="text-align:center; margin:15px;">
  <button onclick="startCamera()" class="scan-btn">
    📷 Scan My Fridge
  </button>
</div>
<div class="featured">
  <img src="https://source.unsplash.com/600x400/?pizza">
  <div class="overlay">
    <p>25 min • Easy</p>
  </div>
</div>
<div id="recipes" class="grid"></div>

<div id="popup" class="popup hidden"></div>

<nav class="bottom-nav">
  <button>🏠</button>
  <button>🔍</button>
  <button>📷</button>
  <button>❤️</button>
</nav>

<script src="script.js"></script>
<div class="music-player">
  🎵 Cooking Jazz - Playing...
</div>
</body>
</html>
