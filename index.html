<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eco-Chef AI</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<header class="header">
  <div>
    <h3>Hey, Chef 👋</h3>
    <p class="sub">What's on the menu today?</p>
  </div>
</header>

<input type="text" id="search" placeholder="Search recipes...">

<div id="chips"></div>

<main id="recipes" class="grid"></main>

<!-- POPUPS -->
<div id="popup" class="popup hidden"></div>
<div id="scanner" class="popup hidden"></div>

<!-- 🎵 MUSIC -->
<div class="music-player">
  <span>🎵 Relax Cooking Mode</span>
  <button onclick="toggleMusic()" id="musicBtn">▶️</button>
</div>

<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<!-- NAV -->
<nav class="bottom-nav">
  <button onclick="goHome()"><i data-lucide="home"></i></button>
  <button onclick="document.getElementById('search').focus()"><i data-lucide="search"></i></button>
  <button onclick="startCamera()"><i data-lucide="camera"></i></button>
  <button onclick="showFavorites()"><i data-lucide="heart"></i></button>
</nav>

<script src="script.js"></script>

</body>
</html>
