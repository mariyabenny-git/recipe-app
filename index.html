<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eco-Chef AI</title>

  <link rel="stylesheet" href="style.css"/>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <h2>🌱 Eco-Chef AI</h2>
  <div>
    <button id="toggleDark">🌙</button>
    <button onclick="toggleLang()">🌍</button>
  </div>
</header>

<!-- SEARCH -->
<input type="text" id="search" placeholder="Search recipes..." />

<!-- CATEGORY CHIPS -->
<div id="chips"></div>

<!-- SCAN BUTTON (clean UI) -->
<div style="text-align:center; margin:15px;">
  <button onclick="startCamera()" 
    style="padding:12px 20px; border:none; border-radius:25px; background:#66bb6a; color:white;">
    📷 Scan My Fridge
  </button>
</div>

<!-- RECIPES -->
<div id="recipes" class="grid"></div>

<!-- POPUP -->
<div id="popup" class="popup hidden"></div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button onclick="loadRecipes(); setActive(0)">🏠</button>
  <button onclick="showFavorites(); setActive(1)">❤️</button>
  <button onclick="startCamera(); setActive(2)">📷</button>
</nav>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
