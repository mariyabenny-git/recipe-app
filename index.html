<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eco-Chef AI</title>

  <link rel="stylesheet" href="style.css">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <!-- ICONS -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<header class="header">
  <div>
    <h3>Hey, Chef 👋</h3>
    <p class="sub">Smart Cooking Assistant</p>
  </div>
</header>

<input type="text" id="search" placeholder="Search recipes...">

<div id="chips"></div>

<main id="recipes" class="grid"></main>

<!-- POPUPS -->
<div id="popup" class="popup hidden"></div>
<div id="scanner" class="popup hidden"></div>

<!-- MUSIC -->
<div class="music-player">
  <span>🎵 Relax Mode</span>
  <button onclick="toggleMusic()">▶️</button>
</div>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b0c8c.mp3">
</audio>

<!-- NAV -->
<nav class="bottom-nav">
  <button onclick="goHome(); setActive('homeBtn')" id="homeBtn">
    <i data-lucide="home"></i>
  </button>

  <button onclick="document.getElementById('search').focus(); setActive('searchBtn')" id="searchBtn">
    <i data-lucide="search"></i>
  </button>

  <button onclick="startCamera(); setActive('cameraBtn')" id="cameraBtn">
    <i data-lucide="camera"></i>
  </button>

  <button onclick="showFavorites(); setActive('favBtn')" id="favBtn">
    <i data-lucide="heart"></i>
  </button>
</nav>

<script src="script.js"></script>
</body>
</html>
